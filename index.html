<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>文房檔案室 · Stationery Archive</title>
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" type="image/png" href="icon.png">
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,700;12..96,800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Serif+TC:wght@500;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#C2A37A; --paper-2:#F4ECDB; --cream:#FBF5E5;
  --ink:#1A1A1A; --ink-2:#3a3a3a; --ink-3:#5C5651;
  --mute:#7E848A; --mute-2:#A8ADB2;
  --steel:#A8ADB2; --steel-d:#7E848A; --frame:#8a8f95;
  --line:#D8CFB6; --line-2:#C5B994;
  --sky:#9BC1D9; --sky-d:#5C8DAC;
  --terra:#C97B47; --forest:#3F6B4E;
  --mint:#A8C9B0; --coral:#D88474;
  --mustard:#D9A85C; --plum:#7D5A6E;
  --stamp:#B84A3A;
  /* Craft palette (12) - vibrant accents */
  --c-tomato:#D85A30;  --c-grass:#4A7E3F;
  --c-lavender:#B59ABF;--c-mustard:#E5BC4F;
  --c-caramel:#D17F3D; --c-iceblue:#C8DEEA;
  --c-lake:#3F8B8C;    --c-lilac:#D9C8E0;
  --c-apricot:#F0CB87; --c-peach:#E6BBA8;
  --c-bronze:#A77723;  --c-sage:#D2DAB8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html{-webkit-text-size-adjust:100%}
body{
  font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,'PingFang TC',sans-serif;
  background:var(--paper); color:var(--ink);
}

.font-display{font-family:'Bricolage Grotesque','Noto Serif TC',sans-serif;font-weight:800;letter-spacing:-0.02em}
.font-serif-tc{font-family:'Noto Serif TC',serif;font-weight:600}
.font-mono{font-family:'JetBrains Mono',monospace}
.font-mono-sm{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.12em}

.surface{background:var(--paper-2);border:1px solid var(--line);border-radius:6px}
.surface-cream{background:var(--cream);border:1px solid var(--line);border-radius:6px}
.surface-flat{background:#fff;border:1px solid var(--line);border-radius:6px}
.paper-card{background:var(--cream);border:1px solid var(--line);border-radius:5px;box-shadow:1px 2px 0 rgba(0,0,0,.04)}

.stamp{
  display:inline-flex;align-items:center;gap:6px;
  font-family:'JetBrains Mono',monospace;font-size:9.5px;font-weight:500;
  color:var(--stamp);border:1.4px solid var(--stamp);
  padding:4px 8px;border-radius:3px;letter-spacing:0.1em;
  background:rgba(255,255,255,.25);
}
.stamp.tilt-l{transform:rotate(-1.5deg)}
.stamp.tilt-r{transform:rotate(1.5deg)}
.stamp.solid{background:var(--ink);color:var(--cream);border-color:var(--ink)}

.sec-h{
  font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;
  letter-spacing:0.18em;text-transform:uppercase;color:var(--ink-3);
  display:flex;align-items:center;gap:8px;margin-bottom:8px;
}
.sec-h::before{content:"";width:14px;height:1.5px;background:var(--ink-3)}
.sec-h .zh{font-family:'Noto Serif TC',serif;font-weight:600;letter-spacing:0.12em;color:var(--ink-2);font-size:11px}

.tab-folder{
  font-family:'Noto Sans TC',sans-serif;font-weight:500;font-size:12px;
  padding:6px 11px 9px;border-radius:6px 6px 0 0;
  background:#d4cab2;color:var(--ink-3);
  border:1px solid var(--line-2);border-bottom:none;
  position:relative;transform:translateY(2px);cursor:pointer;
  white-space:nowrap;flex-shrink:0;
}
.tab-folder.on{
  background:var(--paper-2);color:var(--ink);font-weight:700;
  transform:translateY(0);z-index:2;padding:8px 13px 10px;
  box-shadow:0 -2px 0 var(--ink) inset;
}
.tab-folder .ct{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--mute);margin-left:4px;font-weight:500}
.tab-folder.on .ct{color:var(--ink-3)}

.inp{
  width:100%;background:#fff;border:1px solid var(--line);border-radius:5px;
  padding:9px 12px;font-size:13.5px;color:var(--ink);
  font-family:'Noto Sans TC',sans-serif;
  transition:border-color .15s, box-shadow .15s;
}
.inp:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,26,26,.06)}
.inp::placeholder{color:var(--mute);font-size:12.5px}
.inp-mono{font-family:'JetBrains Mono',monospace;font-size:12.5px}
.inp-search{padding-left:34px;font-size:14.5px}

.lbl{
  display:block;font-family:'JetBrains Mono',monospace;font-size:9.5px;
  font-weight:600;letter-spacing:0.16em;text-transform:uppercase;
  color:var(--ink-3);margin-bottom:5px;
}
.lbl .opt{color:var(--mute);font-weight:400;text-transform:none;letter-spacing:0.04em;margin-left:4px}

.press{transition:transform .1s ease}
.press:active{transform:scale(.96)}

.lift{transition:transform .2s ease, box-shadow .2s ease}
.lift:hover{transform:translateY(-2px);box-shadow:0 6px 12px -2px rgba(0,0,0,.08)}

.arch-tab{
  font-family:'JetBrains Mono',monospace;font-size:8.5px;font-weight:600;
  background:var(--ink);color:var(--cream);
  padding:3px 7px;letter-spacing:0.08em;
  display:inline-block;
}

.tape{
  position:absolute;width:46px;height:13px;
  background: repeating-linear-gradient(45deg, var(--coral) 0 7px, var(--terra) 7px 14px);
  transform:rotate(-7deg);
  box-shadow:1px 1px 3px rgba(0,0,0,.1);
  opacity:.85;pointer-events:none;
}
.tape.b{background:repeating-linear-gradient(-45deg, var(--mint) 0 6px, var(--forest) 6px 12px)}
.tape.c{background:repeating-linear-gradient(45deg, var(--sky) 0 6px, var(--sky-d) 6px 12px)}
.tape.d{background:repeating-linear-gradient(-45deg, var(--mustard) 0 6px, var(--terra) 6px 12px)}

.chip{
  display:inline-flex;align-items:center;gap:2px;
  padding:3px 8px;border-radius:3px;font-size:11.5px;
  font-family:'Noto Sans TC',sans-serif;font-weight:500;
  border:1px solid transparent;cursor:pointer;
  transition:opacity .15s;
}
.chip:hover{opacity:.85}
.chip.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}
.chip-x{margin-left:2px;font-weight:700;opacity:.55}
.chip-x:hover{opacity:1;color:var(--stamp)}

.perf{
  height:1px;
  background-image:linear-gradient(to right, var(--line-2) 50%, transparent 50%);
  background-size:8px 1px;background-repeat:repeat-x;
  margin:14px 0;
}

@keyframes file-in{0%{transform:translateY(-30px) rotate(-3deg);opacity:0}60%{transform:translateY(2px) rotate(.5deg);opacity:1}100%{transform:translateY(0) rotate(0);opacity:1}}
.file-in{animation:file-in .4s ease-out}

@keyframes wiggle{0%,100%{transform:rotate(0)}25%{transform:rotate(-3deg)}75%{transform:rotate(3deg)}}
.wiggle:hover{animation:wiggle .5s ease-in-out}

@keyframes slide-up{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.slide-up{animation:slide-up .3s ease-out}

.modal-bg{background:rgba(40,35,25,0.45);backdrop-filter:blur(3px)}

.no-scrollbar::-webkit-scrollbar{display:none}
.no-scrollbar{scrollbar-width:none}

/* ========== FAB (cream + emoji) ========== */
.fab-stamp{
  width:58px;height:58px;border-radius:50%;
  background:#EE6B3A;
  border:1.6px solid var(--ink);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 14px -3px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.25);
  cursor:pointer;
  transition:transform .1s ease;
  padding:0;
}
.fab-stamp::before{
  content:"";position:absolute;inset:-5px;border-radius:50%;
  border:1.3px dashed var(--ink);opacity:.4;
}
.fab-stamp svg{width:24px;height:24px;display:block}
.fab-stamp svg line{stroke:#528BAB;stroke-width:4;stroke-linecap:round}
.fab-stamp:active{transform:scale(.95)}
.fab-stamp.lift{animation:fab-lift .32s ease-out}
@keyframes fab-lift{
  0%{transform:scale(1) rotate(0)}
  35%{transform:scale(1.1) translateY(-3px) rotate(-3deg)}
  100%{transform:scale(1) rotate(0)}
}

/* ========== Scroll-to-top FAB (G) ========== */
.top-fab{
  position:fixed;bottom:84px;right:11px;z-index:19;
  width:42px;height:42px;border-radius:50%;
  background:#fff;border:1.4px solid var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;
  color:var(--ink);cursor:pointer;
  box-shadow:0 4px 10px -2px rgba(0,0,0,.18);
  opacity:0;pointer-events:none;
  transform:translateY(10px);
  transition:opacity .25s ease, transform .25s ease;
  padding:0;
}
.top-fab.show{opacity:1;pointer-events:auto;transform:translateY(0)}
.top-fab:active{transform:scale(.94)}

/* ========== Card highlight after return (B) ========== */
@keyframes card-pulse{
  0%{background:#FFF2C5;box-shadow:0 0 0 3px #E5BC4F, 1px 2px 0 rgba(0,0,0,.04)}
  60%{background:#FFF2C5;box-shadow:0 0 0 3px #E5BC4F, 1px 2px 0 rgba(0,0,0,.04)}
  100%{background:#fff;box-shadow:1px 2px 0 rgba(0,0,0,.04)}
}
.card-pulse{animation:card-pulse 1.6s ease-out}

/* ========== Detail bottom action bar (C) ========== */
.detail-bbar{
  position:fixed;bottom:0;left:0;right:0;z-index:30;
  background:var(--paper-2);
  border-top:1px solid var(--line-2);
  padding:10px 14px calc(12px + env(safe-area-inset-bottom));
  display:flex;align-items:center;gap:10px;
  box-shadow:0 -4px 12px -8px rgba(0,0,0,.15);
}
.bb-del{
  flex-shrink:0;padding:0;width:42px;height:42px;
  background:transparent;border:1px solid var(--line);border-radius:5px;
  font-size:16px;color:var(--stamp);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .1s ease;
}
.bb-del:active{transform:scale(.94)}
.bb-back{
  flex:1;padding:11px;
  background:#fff;border:1px solid var(--line);border-radius:5px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;
  font-weight:600;letter-spacing:0.14em;color:var(--ink-2);
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:transform .1s ease;
}
.bb-back:active{transform:scale(.97)}
.bb-edit{
  flex-shrink:0;padding:11px 22px;
  background:var(--ink);color:var(--cream);
  border:none;border-radius:5px;
  font-family:'JetBrains Mono',monospace;font-size:11.5px;
  font-weight:700;letter-spacing:0.16em;cursor:pointer;
  display:flex;align-items:center;gap:6px;
  box-shadow:0 2px 0 rgba(0,0,0,.12);
  transition:transform .1s ease;
}
.bb-edit:active{transform:scale(.97) translateY(1px);box-shadow:0 1px 0 rgba(0,0,0,.12)}

/* ========== Detail swipe nav indicator (E) ========== */
.swipe-hint{
  position:absolute;top:50%;transform:translateY(-50%);
  font-family:'JetBrains Mono',monospace;font-size:18px;
  color:var(--ink);
  background:rgba(255,255,255,.85);
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  pointer-events:none;opacity:0;
  border:1px solid var(--line);
  transition:opacity .15s ease;
  z-index:5;
}
.swipe-hint.left{left:12px}
.swipe-hint.right{right:12px}
.swipe-hint.active{opacity:1}
.detail-pos{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;font-size:9.5px;
  letter-spacing:0.14em;color:var(--ink-3);font-weight:600;
  background:rgba(255,255,255,.7);
  padding:2px 8px;border-radius:3px;
  pointer-events:none;
  z-index:4;
}

/* ========== Photo zoom fullscreen (F) ========== */
.photo-zoom-overlay{
  position:fixed;inset:0;z-index:200;
  background:rgba(0,0,0,.92);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  touch-action:none;
}
.photo-zoom-img{
  max-width:100vw;max-height:100vh;
  width:auto;height:auto;
  transform-origin:center center;
  transition:none;
  user-select:none;-webkit-user-drag:none;
  will-change:transform;
}
.photo-zoom-close{
  position:absolute;top:env(safe-area-inset-top,20px);right:16px;
  width:42px;height:42px;border-radius:50%;
  background:rgba(255,255,255,.15);
  border:1px solid rgba(255,255,255,.3);
  color:#fff;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;backdrop-filter:blur(8px);
  z-index:201;
}
.photo-zoom-hint{
  position:absolute;bottom:calc(20px + env(safe-area-inset-bottom));
  left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;font-size:10px;
  letter-spacing:0.14em;color:rgba(255,255,255,.6);
  text-align:center;line-height:1.6;
  pointer-events:none;
}

/* ========== Archive button (FILE INTO ARCHIVE) ========== */
.archive-btn{
  width:100%;
  padding:14px;border-radius:5px;
  font-size:13px;font-weight:700;
  letter-spacing:0.18em;
  font-family:'JetBrains Mono',monospace;
  border:none;cursor:pointer;
  transition:transform .1s ease, background .15s ease;
  background:var(--ink);color:var(--cream);
}
.archive-btn[disabled]{
  background:var(--line);color:var(--mute);cursor:not-allowed;
}
.archive-btn:active:not([disabled]){transform:scale(.98)}
.archive-btn.flash{animation:btn-flash 0.8s ease-out}
@keyframes btn-flash{
  0%{background:var(--ink)}
  8%{background:var(--stamp);transform:scale(.97)}
  18%{background:var(--stamp);transform:scale(1)}
  60%{background:var(--stamp)}
  100%{background:var(--ink);transform:scale(1)}
}

/* ========== Center stamp animation ========== */
.stamp-mark{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%) rotate(-12deg) scale(0.3);
  width:180px;height:180px;
  border-radius:50%;
  border:4px solid var(--stamp);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:rgba(184,74,58,0.06);
  pointer-events:none;
  z-index:100;
  opacity:0;
  box-shadow:0 0 0 1px rgba(184,74,58,0.2);
}
.stamp-mark::before{
  content:"";
  position:absolute;inset:8px;
  border-radius:50%;
  border:1.5px dashed var(--stamp);
}
.stamp-mark .sm-lbl{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:0.32em;
  color:var(--stamp);font-weight:700;
  margin-bottom:4px;
}
.stamp-mark .sm-mark{
  font-family:'Bricolage Grotesque',sans-serif;
  font-size:38px;font-weight:800;
  color:var(--stamp);letter-spacing:0.04em;
  line-height:1;
}
.stamp-mark .sm-arch{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;color:var(--stamp);
  margin-top:8px;letter-spacing:0.12em;
  font-weight:600;
}
.stamp-mark .sm-date{
  font-family:'JetBrains Mono',monospace;
  font-size:8.5px;color:var(--stamp);
  margin-top:4px;letter-spacing:0.1em;
  opacity:0.85;
}
.stamp-mark.playing{animation:stamp-appear 0.9s ease-out forwards}
@keyframes stamp-appear{
  0%{opacity:0;transform:translate(-50%,-50%) rotate(-15deg) scale(0.3)}
  18%{opacity:1;transform:translate(-50%,-50%) rotate(-3deg) scale(1.18)}
  32%{transform:translate(-50%,-50%) rotate(-3deg) scale(1)}
  72%{opacity:1;transform:translate(-50%,-50%) rotate(-3deg) scale(1)}
  100%{opacity:0;transform:translate(-50%,-50%) rotate(-3deg) scale(1)}
}

.bar-bg{height:8px;background:#fff;border:1px solid var(--line);border-radius:2px;overflow:hidden;position:relative}
.bar-fill{height:100%;background:var(--ink);transition:width .3s}

.section-dashed{
  border:1.4px dashed var(--line-2);border-radius:6px;
  background:rgba(251,245,229,.5);
}

.archive-band{
  background:linear-gradient(180deg,#c4c8cc 0%, #b0b5ba 100%);
  border:1px solid var(--frame);border-radius:4px;
  padding:8px 10px;color:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.4),inset 0 -1px 0 rgba(0,0,0,.1);
}
.archive-band .lab{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.18em;color:rgba(255,255,255,.85);text-transform:uppercase}
.archive-band .val{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14px;color:#fff;text-shadow:0 1px 0 rgba(0,0,0,.15)}

.type-pill{
  font-family:'Noto Sans TC',sans-serif;font-weight:500;font-size:11.5px;
  padding:5px 11px;border-radius:99px;
  background:#fff;color:var(--ink-3);border:1px solid var(--line);
  white-space:nowrap;flex-shrink:0;cursor:pointer;
}
.type-pill.on{background:var(--ink);color:var(--cream);border-color:var(--ink);font-weight:700}

/* ========== Animation setting radio ========== */
.anim-opt{
  width:100%;text-align:left;
  padding:10px 12px;border-radius:5px;
  display:flex;align-items:center;gap:10px;
  margin-bottom:6px;cursor:pointer;
  background:#fff;border:1.5px solid var(--line);
  transition:border-color .15s,background .15s;
}
.anim-opt:hover{background:var(--cream)}
.anim-opt.on{background:var(--cream);border-color:var(--ink)}
.anim-radio{
  width:14px;height:14px;border-radius:50%;
  border:1.5px solid var(--mute);flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.anim-opt.on .anim-radio{border-color:var(--ink)}
.anim-opt.on .anim-radio::after{
  content:"";width:7px;height:7px;border-radius:50%;background:var(--ink);
}
.anim-name{font-size:13px;font-weight:600}
.anim-desc{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--mute);letter-spacing:0.04em;margin-top:1px}

/* ========== HOME (File Folder Grid) ========== */
.home-container{
  margin:0 auto 100px;
  max-width:420px;
  width:calc(100% - 28px);
  padding-top:8px;
}

.home-head{padding:8px 4px 4px}
.home-head .title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}

.home-search{
  background:#fff;
  border:1px solid var(--line);
  border-radius:5px;
  padding:10px 12px 10px 32px;
  font-family:'JetBrains Mono',monospace;
  font-size:13.5px;color:var(--ink);
  margin:14px 0 4px;
  display:block;width:100%;
  font-weight:400;
}
.home-search:focus{outline:none;border-color:var(--ink);box-shadow:0 0 0 3px rgba(26,26,26,.06)}
.home-search::placeholder{color:var(--mute)}
.home-search-wrap{position:relative}
.home-search-wrap::before{
  content:"";position:absolute;left:11px;top:50%;
  width:13px;height:13px;margin-top:-7px;pointer-events:none;
  background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%237E848A' stroke-width='2.2'><circle cx='11' cy='11' r='7'/><path d='m20 20-3.5-3.5'/></svg>") no-repeat center;
  background-size:contain;z-index:2;
}

.home-sec-label{
  font-family:'JetBrains Mono',monospace;font-size:11.5px;font-weight:700;
  letter-spacing:0.18em;color:var(--ink-3);
  margin:18px 4px 10px;text-transform:uppercase;
  display:flex;align-items:center;gap:8px;
}
.home-sec-label::before{content:"";width:14px;height:1.5px;background:var(--ink-3)}

.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:11px}

.folder-card{
  position:relative;background:var(--card-c,#A77723);
  border-radius:8px 12px 8px 8px;
  padding:14px;
  height:120px;
  display:flex;flex-direction:column;justify-content:space-between;
  cursor:pointer;
  box-shadow:0 2px 0 rgba(0,0,0,.06);
  border:1px solid rgba(0,0,0,.08);
  overflow:hidden;
  transition:transform .12s ease;
}
.folder-card:active{transform:scale(.97)}

/* Folder tab cutout (paper showing through top-right) */
.folder-card::before{
  content:"";position:absolute;top:0;right:0;
  width:48px;height:18px;
  background:var(--paper);
  border-bottom-left-radius:8px;
  box-shadow:-1px 1px 0 rgba(0,0,0,.06);
}
/* Tab tag dot inside cutout */
.folder-card::after{

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, doc, addDoc, setDoc, updateDoc, getDoc, getDocs, deleteDoc, query, where, onSnapshot, enableIndexedDbPersistence, serverTimestamp, writeBatch } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getStorage, ref as storageRef, uploadString, uploadBytes, getDownloadURL, deleteObject, listAll } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* ============== IN-APP DEBUG CONSOLE ============== */
/* Set up early so we capture every log from this point on. */
const __dbgLogs=[];
const __dbgOrig={log:console.log,info:console.info,warn:console.warn,error:console.error};
let __dbgAttnCount=0; /* warns/errors since last open */
function __dbgPush(level,args){
  const msg=args.map(a=>{
    if(a instanceof Error)return a.stack||a.message;
    if(typeof a==="string")return a;
    try{return JSON.stringify(a,(k,v)=>{
      if(typeof v==="string"&&v.length>200)return v.slice(0,200)+"…("+v.length+" chars)";
      return v;
    },2)}catch(e){return String(a)}
  }).join(" ");
  const ts=new Date().toLocaleTimeString("en-GB",{hour12:false})+"."+String(Date.now()%1000).padStart(3,"0");
  __dbgLogs.push({ts,level,msg});
  if(__dbgLogs.length>300)__dbgLogs.shift();
  if(level==="warn"||level==="error"){
    __dbgAttnCount++;
    __dbgUpdateToggle();
  }
  if(window.__dbgOpen)__dbgRenderList();
}
console.log=(...a)=>{__dbgOrig.log(...a);__dbgPush("log",a)};
console.info=(...a)=>{__dbgOrig.info(...a);__dbgPush("info",a)};
console.warn=(...a)=>{__dbgOrig.warn(...a);__dbgPush("warn",a)};
console.error=(...a)=>{__dbgOrig.error(...a);__dbgPush("error",a)};
window.addEventListener("error",e=>{
  __dbgPush("error",["Uncaught:",e.message,"@",e.filename+":"+e.lineno+":"+e.colno]);
});
window.addEventListener("unhandledrejection",e=>{
  __dbgPush("error",["Unhandled rejection:",e.reason]);
});
function __dbgUpdateToggle(){
  const t=document.querySelector(".dbg-toggle");
  if(!t)return;
  if(__dbgAttnCount>0&&!window.__dbgOpen){
    t.classList.add("attn");
    t.textContent=__dbgAttnCount>9?"9+":String(__dbgAttnCount);
  }else{
    t.classList.remove("attn");
    t.textContent="</>";
  }
}
function __dbgRenderList(){
  const list=document.querySelector(".dbg-list");
  if(!list)return;
  list.innerHTML="";
  if(!__dbgLogs.length){
    list.appendChild(Object.assign(document.createElement("div"),{className:"dbg-empty",textContent:"沒有 log 紀錄 · No logs yet"}));
  }else{
    __dbgLogs.forEach(l=>{
      const row=document.createElement("div");
      row.className="dbg-row lv-"+l.level;
      row.innerHTML=`<span class="dbg-ts">${l.ts}</span><span class="dbg-lvl">${l.level.toUpperCase()}</span><span class="dbg-msg"></span>`;
      row.querySelector(".dbg-msg").textContent=l.msg;
      list.appendChild(row);
    });
    list.scrollTop=list.scrollHeight;
  }
  const cnt=document.querySelector(".dbg-count");
  if(cnt)cnt.textContent=`${__dbgLogs.length} 條`;
}
function __dbgOpen(){
  if(document.querySelector(".dbg-overlay"))return;
  window.__dbgOpen=true;
  __dbgAttnCount=0;__dbgUpdateToggle();
  const ov=document.createElement("div");
  ov.className="dbg-overlay";
  ov.innerHTML=`
    <div class="dbg-header">
      <span class="dbg-title">CONSOLE</span>
      <span class="dbg-count">0 條</span>
      <div class="dbg-actions">
        <button class="dbg-copy">COPY</button>
        <button class="dbg-clear">CLEAR</button>
        <button class="dbg-close">×</button>
      </div>
    </div>
    <div class="dbg-list"></div>
  `;
  document.body.appendChild(ov);
  ov.querySelector(".dbg-close").onclick=__dbgClose;
  ov.querySelector(".dbg-clear").onclick=()=>{__dbgLogs.length=0;__dbgAttnCount=0;__dbgRenderList();__dbgUpdateToggle()};
  ov.querySelector(".dbg-copy").onclick=async()=>{
    const text=__dbgLogs.map(l=>`[${l.ts}] ${l.level.toUpperCase()}: ${l.msg}`).join("\n");
    try{await navigator.clipboard.writeText(text);ov.querySelector(".dbg-copy").textContent="✓ COPIED";setTimeout(()=>{const b=ov.querySelector(".dbg-copy");if(b)b.textContent="COPY"},1500)}
    catch{prompt("手動複製這段：",text)}
  };
  __dbgRenderList();
}
function __dbgClose(){
  const ov=document.querySelector(".dbg-overlay");
  if(ov)ov.remove();
  window.__dbgOpen=false;
}
/* Toggle button: append to body once DOM is ready */
function __dbgEnsureToggle(){
  if(document.querySelector(".dbg-toggle"))return;
  const btn=document.createElement("button");
  btn.className="dbg-toggle";
  btn.textContent="</>";
  btn.title="開啟 console";
  btn.onclick=()=>{window.__dbgOpen?__dbgClose():__dbgOpen()};
  document.body.appendChild(btn);
  __dbgUpdateToggle();
}
if(document.readyState==="loading"){
  document.addEventListener("DOMContentLoaded",__dbgEnsureToggle);
}else{__dbgEnsureToggle()}

const firebaseConfig = {
  apiKey: "AIzaSyAJMq-J4iXq2xMtH18qyrG3-p5WtlF_Zss",
  authDomain: "stationery-archive.firebaseapp.com",
  projectId: "stationery-archive",
  storageBucket: "stationery-archive.firebasestorage.app",
  messagingSenderId: "997216921598",
  appId: "1:997216921598:web:392105776e33c14389c2af"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const storage = getStorage(app);

// Try offline persistence (must be before any Firestore operations)
try {
  await enableIndexedDbPersistence(db);
  console.log("[Firebase] Offline persistence enabled");
} catch (err) {
  if (err.code === 'failed-precondition') {
    console.warn("[Firebase] Multiple tabs open, only one can have persistence");
  } else if (err.code === 'unimplemented') {
    console.warn("[Firebase] Browser does not support persistence");
  }
}

// Expose to global scope so non-module code can use
window.fb = {
  app, auth, db, storage,
  GoogleAuthProvider, signInWithPopup, signInWithRedirect, getRedirectResult, signOut, onAuthStateChanged,
  collection, doc, addDoc, setDoc, updateDoc, getDoc, getDocs, deleteDoc, query, where, onSnapshot, serverTimestamp, writeBatch,
  storageRef, uploadString, uploadBytes, getDownloadURL, deleteObject, listAll
};

// Signal ready
window.firebaseReady = true;
window.dispatchEvent(new Event("firebaseready"));
console.log("[Firebase] Ready");
</script>

/* ----- Firestore CRUD ----- */
async function dbAll(s){

async function dbAdd(s,item){
  // For "items": pre-generate doc ref so we can use its ID as photo path
  const colRef=fb.collection(fb.db,...userPath(s));
  const newRef=fb.doc(colRef);
  if(s==="items"){
    if(!item.archiveNum)item.archiveNum=await nextArchiveNum(item.type,item.purchaseDate);
    if(!item.addedAt)item.addedAt=new Date().toISOString();
    if(item.photo&&item.photo.startsWith("data:")){
      item.photo=await uploadPhoto(newRef.id,item.photo);
    }
  }
  const data={...item};
  delete data.id;
  await fb.setDoc(newRef,data);
  return newRef.id;
}
async function dbPut(s,item){

  const data={...item};
  const id=data.id;delete data.id;
  if(s==="items"&&data.photo&&data.photo.startsWith("data:")){

async function uploadPhoto(itemId,base64){

  const path=`users/${currentUser.uid}/photos/${itemId}.jpg`;

/* Compute next archiveNum for given type+year (1-based, sequential) */
async function nextArchiveNum(type,purchaseDate){
  const year=purchaseDate?purchaseDate.slice(0,4):String(new Date().getFullYear());
  const sameTypeYear=state.items.filter(i=>{
    const iy=i.purchaseDate?i.purchaseDate.slice(0,4):"";
    return i.type===type&&(iy===year||(!iy&&year===String(new Date().getFullYear())));
  });
  const max=sameTypeYear.reduce((m,i)=>Math.max(m,i.archiveNum||0),0);
  return max+1;
}

function compress(file,max=800,q=.8){return new Promise(res=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=async()=>{let{width:w,height:hh}=img;const origRatio=w/hh;let ratio="square";if(origRatio<0.9)ratio="portrait";else if(origRatio>1.1)ratio="landscape";if(w>hh&&w>max){hh*=max/w;w=max}else if(hh>max){w*=max/hh;hh=max}const c=document.createElement("canvas");c.width=w;c.height=hh;c.getContext("2d").drawImage(img,0,0,w,hh);const photo=c.toDataURL("image/jpeg",q);/* H: ensure MobileNet loaded (shows UI overlay first time only) */let photoEmb=null;try{await ensureModelLoadedWithUI();const t0=performance.now();photoEmb=await computeImageEmbedding(photo);console.log(`[Compress] photo ${w}x${hh}, ratio=${ratio}, emb=${photoEmb?photoEmb.slice(0,12)+"...":"FAILED"} (${(performance.now()-t0).toFixed(0)}ms)`)}catch(e){console.warn("[Compress] embedding skipped:",e.message)}res({photo,photoRatio:ratio,photoEmb})};img.src=e.target.result};r.readAsDataURL(file)})}

function triggerSaveAnimation(btn,item){
  const mode=state.animationStyle||"both";
  if(mode==="off") return 0;
  const arch=getArchiveNo(item);
  const dateStr=(item.purchaseDate||new Date().toISOString().slice(0,10)).replace(/-/g,'.');
  let duration=0;

  if((mode==="button"||mode==="both") && btn){

    void btn.offsetWidth;
    btn.classList.add("flash");

    setTimeout(()=>{
      btn.classList.remove("flash");
      if(btn.isConnected) btn.textContent=originalText;
    },800);
    duration=Math.max(duration,800);

  if(mode==="stamp"||mode==="both"){
    const stamp=document.getElementById("stampMark");

      h("div",{class:"font-display text-2xl mt-3"},pairs.length?`找到 ${pairs.length} 對可能重複`:"✓ 沒有發現重複"),
      pairs.length>0&&h("div",{class:"font-mono text-xs mt-1",style:{color:"var(--mute)",letterSpacing:"0.06em"}},"按相似度由高到低排序")
    ));
    if(!pairs.length){
      content.appendChild(h("div",{style:{textAlign:"center",padding:"20px 0",fontSize:"13px",color:"var(--ink-2)",lineHeight:1.65}},"目前資料庫沒有相似度超過 85% 的圖片",h("br"),h("span",{style:{fontSize:"12px",color:"var(--mute)"}},"cosine similarity threshold = 0.85")));
      content.appendChild(h("button",{class:"w-full press mt-4",style:{padding:"12px",background:"var(--ink)",color:"var(--cream)",border:"none",borderRadius:"5px",fontFamily:"'JetBrains Mono',monospace",fontSize:"12px",fontWeight:700,letterSpacing:"0.14em",cursor:"pointer"},onclick:()=>setS({modal:null})},"✓ 完成"));
      return;
    }
    /* Pairs list */
    pairs.slice(0,30).forEach((p,idx)=>{
      const pct=Math.round(p.sim*100);
      const isStrong=p.sim>=0.93;
      const row=h("div",{style:{padding:"10px 0",borderBottom:idx<pairs.length-1?"1px dashed var(--line-2)":"none"}});
      /* Header line */
      row.appendChild(h("div",{class:"flex items-center justify-between mb-2"},
        h("span",{class:"font-mono",style:{fontSize:"10.5px",letterSpacing:"0.1em",color:"var(--ink-3)",fontWeight:600}},`#${idx+1}`),
        h("span",{class:"font-mono",style:{fontSize:"10.5px",fontWeight:700,color:isStrong?"var(--stamp)":"var(--ink-2)",letterSpacing:"0.06em"}},`${pct}% 相似`)
      ));
      /* Two thumbnails side-by-side */
      const pair=h("div",{class:"flex gap-2"});
      [p.a,p.b].forEach(it=>{
        const card=h("div",{class:"press",style:{flex:1,cursor:"pointer",background:"var(--cream)",border:"1px solid var(--line)",borderRadius:"4px",overflow:"hidden"},onclick:()=>{setS({modal:null,view:"detail",selected:it})}});
        const thumb=h("div",{style:{width:"100%",aspectRatio:"4/5",background:"var(--paper-2)",display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}});
        if(it.photo){
          const im=h("img",{style:{width:"100%",height:"100%",objectFit:"cover"}});
          im.src=it.photo;
          thumb.appendChild(im);
        }else{
          thumb.appendChild(h("div",{style:{fontSize:"32px"}},getTypeIcon(it.type)));
        }
        card.appendChild(thumb);
        card.appendChild(h("div",{style:{padding:"6px 8px"}},
          h("div",{class:"font-mono",style:{fontSize:"9px",letterSpacing:"0.06em",color:"var(--ink-3)"}},getArchiveNo(it)),
          h("div",{style:{fontSize:"11.5px",fontWeight:600,lineHeight:1.3,marginTop:"2px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},autoName(it))
        ));
        pair.appendChild(card);
      });
      row.appendChild(pair);
      content.appendChild(row);
    });
    if(pairs.length>30){
      content.appendChild(h("div",{class:"font-mono text-center",style:{fontSize:"11px",color:"var(--mute)",letterSpacing:"0.08em",padding:"10px 0 4px"}},`+ ${pairs.length-30} 對未顯示（顯示前 30 對最相似的）`));
    }
    content.appendChild(h("button",{class:"w-full press mt-3",style:{padding:"12px",background:"var(--ink)",color:"var(--cream)",border:"none",borderRadius:"5px",fontFamily:"'JetBrains Mono',monospace",fontSize:"12px",fontWeight:700,letterSpacing:"0.14em",cursor:"pointer"},onclick:()=>setS({modal:null})},"✓ 關閉"));
  }};
  render();
}

/* ============== VIEW: GALLERY (Category List - clicked from shelf) ============== */
function viewGallery(){
const isAll=state.ftype==="全部";
const filtered=sortByOrder(state.items.filter(i=>{const a=isAll||i.type===state.ftype;const b=matchesQuery(i,state.q);const c=state.filters.length===0||state.filters.every(x=>i.tags.includes(x));return a&&b&&c}));
const tagCount={};
const sourceForTags=isAll?state.items:state.items.filter(i=>i.type===state.ftype);
sourceForTags.forEach(i=>i.tags.forEach(t=>tagCount[t]=(tagCount[t]||0)+1));
const topTags=Object.entries(tagCount).sort((a,b)=>b[1]-a[1]).slice(0,8).map(([t])=>t);

const w=h("div",{class:"min-h-screen pb-32"});

const hdr=h("div",{class:"sticky top-0 z-10 px-4 pt-3 pb-3 space-y-3",style:{background:"var(--paper)",borderBottom:"1px solid var(--line)"}});

/* Title row: back + category info + count */
const titleCode=isAll?"ALL":getTypeCode(state.ftype);
const titleIcon=isAll?"📂":getTypeIcon(state.ftype);
const totalInCat=isAll?state.items.length:state.items.filter(i=>i.type===state.ftype).length;

hdr.appendChild(h("div",{class:"flex items-center gap-3"},
  h("button",{class:"text-2xl press",style:{color:"var(--ink-3)"},onclick:()=>setS({view:"shelf",ftype:"全部",q:"",filters:[]})},"←"),

      h("span",{class:"font-display text-xl leading-none"},titleIcon+" "+state.ftype)

    h("div",{class:"font-mono mt-1",style:{fontSize:"12.5px",color:"var(--mute)",letterSpacing:"0.06em"}},

    )
  ),
  /* Sort toggle button */
  h("button",{class:"font-mono press",style:{fontSize:"10.5px",padding:"5px 9px",background:"#fff",border:"1px solid var(--line)",borderRadius:"3px",color:"var(--ink-2)",letterSpacing:"0.06em",fontWeight:600,whiteSpace:"nowrap",flexShrink:"0"},title:"切換排序",onclick:toggleSortOrder},state.sortOrder==="newest"?"↓ 新→舊":"↑ 舊→新")
));

/* Search bar (scoped to current category) */
const searchWrap=h("div",{class:"relative"});
searchWrap.appendChild(h("div",{class:"absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none",style:{color:"var(--mute)"}},h("svg",{width:"15",height:"15",viewBox:"0 0 24 24",fill:"none",stroke:"currentColor","stroke-width":"2.2"},h("circle",{cx:"11",cy:"11",r:"7"}),h("path",{d:"m20 20-3.5-3.5"}))));
searchWrap.appendChild(makeTextInput({role:"search",value:state.q,attrs:{class:"inp inp-mono inp-search",placeholder:isAll?"搜尋全部 (空格分多關鍵字)":`在「${state.ftype}」中搜尋`},oninput:v=>{state.q=v;render()}}));
hdr.appendChild(searchWrap);

if(state.filters.length){
  const fr=h("div",{class:"flex gap-1.5 flex-wrap items-center pt-1"});
  fr.appendChild(h("span",{class:"font-mono-sm",style:{color:"var(--mute)"}},"FILTERED ·"));
  state.filters.forEach(t=>fr.appendChild(tagChip(t,{active:true,onRemove:()=>tog(t)})));
  fr.appendChild(h("button",{class:"font-mono text-xs press",style:{color:"var(--stamp)",letterSpacing:"0.1em",marginLeft:"auto",textDecoration:"underline"},onclick:()=>setS({filters:[]})},"清除全部"));
  hdr.appendChild(fr)
}
w.appendChild(hdr);

if(topTags.length&&!state.filters.length&&!state.q){
  const tc=h("div",{class:"px-4 pt-3 pb-1"});

    h("div",{class:"sec-h",style:{margin:0}},"FREQUENT TAGS",h("span",{class:"zh"},"常用")),
    h("button",{class:"font-mono text-xs press",style:{color:"var(--ink)",letterSpacing:"0.1em"},onclick:()=>setS({view:"tagBrowse"})},"看全部 →")
  ));
  const tg=h("div",{class:"flex gap-1.5 flex-wrap"});
  topTags.forEach(t=>tg.appendChild(tagChip(t,{onclick:()=>tog(t)})));
  tc.appendChild(tg);
  w.appendChild(tc)
}

const gw=h("div",{class:"px-4 pt-3"});
if(!filtered.length){
  const isCatEmpty=totalInCat===0;
  gw.appendChild(h("div",{class:"text-center py-16"},
    h("div",{class:"text-6xl mb-3"},isCatEmpty?titleIcon:"🔍"),
    h("div",{class:"font-display text-xl mb-1"},isCatEmpty?`還沒有「${state.ftype}」`:"找不到符合的"),
    h("div",{class:"font-mono text-xs",style:{color:"var(--mute)",letterSpacing:"0.08em"}},isCatEmpty?"按右下角 ➕ 開始歸檔":"試試別的關鍵字或清除篩選")
  ))
}else{
  const g=h("div",{class:"grid grid-cols-2 gap-3"});
  filtered.forEach(it=>g.appendChild(itemCard(it)));
  gw.appendChild(g);
}
w.appendChild(gw);

/* FAB - 📝 emoji on cream + black border */
const fab=h("button",{class:"fab-stamp fixed bottom-6 right-5 z-20",style:{position:"fixed"},onclick:e=>{
  const fabEl=e.currentTarget;
  const newForm=emptyForm();
  if(!isAll) newForm.type=state.ftype;
  if(triggerAddAnimation(fabEl)){
    setTimeout(()=>setS({view:"add",form:newForm}),200);
  }else{
    setS({view:"add",form:newForm});
  }
}},plusIcon());
w.appendChild(fab);

/* Scroll-to-top FAB (G) - appears when scrolled down past ~1 screen */
const topFab=h("button",{class:"top-fab",title:"回頂部",onclick:()=>window.scrollTo({top:0,behavior:"smooth"})},"↑");
w.appendChild(topFab);
const onScroll=()=>{
  if(window.scrollY>window.innerHeight*0.6)topFab.classList.add("show");
  else topFab.classList.remove("show");
};
window.removeEventListener("scroll",window.__topFabHandler||(()=>{}));
window.__topFabHandler=onScroll;
window.addEventListener("scroll",onScroll,{passive:true});

/* Scroll restore + highlight after returning from detail/edit (B) */
if(state.lastEditedId!=null){
  const targetId=state.lastEditedId;
  state.lastEditedId=null;
  requestAnimationFrame(()=>{
    /* Use a second rAF to ensure layout has settled */
    requestAnimationFrame(()=>{
      const el=document.querySelector(`[data-item-id="${CSS.escape(String(targetId))}"]`);
      if(el){
        el.scrollIntoView({block:"center",behavior:"auto"});
        el.classList.add("card-pulse");
        setTimeout(()=>el.classList.remove("card-pulse"),1700);
      }
    });
  });
}

return w;
}

/* ============== ITEM CARD ============== */
function itemCard(item){
const c=getCardColor(item.tags);
const card=h("div",{class:"lift cursor-pointer relative","data-item-id":item.id,style:{background:"#fff",border:"1px solid var(--line)",borderRadius:"5px",overflow:"hidden",boxShadow:"1px 2px 0 rgba(0,0,0,.04)"},onclick:()=>setS({selected:item,view:"detail"})});

card.appendChild(h("div",{class:"arch-tab",style:{position:"absolute",top:"6px",left:"6px",zIndex:2}},getArchiveNo(item)));

const pw=h("div",{class:"relative",style:{aspectRatio:"4/5",background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden"}});
if(item.photo){const im=h("img",{class:"w-full h-full",style:{objectFit:item.photoRatio==="portrait"?"cover":"contain"}});im.src=item.photo;pw.appendChild(im)}
else pw.appendChild(h("div",{class:"text-5xl",style:{filter:"grayscale(.15)"}},getTypeIcon(item.type)));

if(isNew(item)) pw.appendChild(h("div",{style:{position:"absolute",bottom:"6px",right:"6px"}},h("span",{class:"stamp tilt-r",style:{fontSize:"8px",padding:"2px 5px"}},"NEW")));
if(item.quantity&&item.quantity>1) pw.appendChild(h("div",{class:"font-mono",style:{position:"absolute",bottom:"6px",left:"6px",background:"rgba(255,255,255,.9)",padding:"2px 5px",fontSize:"9.5px",fontWeight:600,borderRadius:"2px"}},"× "+item.quantity));

if(item.id){const variants=["","b","c","d"];const v=variants[(item.archiveNum||0)%4];const tape=h("div",{class:"tape "+v,style:{top:"-6px",right:"10px",width:"38px",height:"10px"}});pw.appendChild(tape)}
card.appendChild(pw);

const b=h("div",{style:{padding:"8px 9px 9px",borderTop:"1px dashed var(--line-2)"}});
b.appendChild(h("div",{class:"font-bold truncate",style:{fontSize:"15px",lineHeight:1.3,color:"var(--ink)"}},autoName(item)));

const meta=[];
if(item.brand)meta.push(item.brand);
if(item.price){const cu=CURRENCIES.find(x=>x.code===item.currency)||CURRENCIES[0];meta.push(cu.symbol+item.price)}
b.appendChild(h("div",{class:"font-mono",style:{fontSize:"11px",color:"var(--mute)",marginTop:"2px",letterSpacing:"0.04em"}},meta.join(" · ")||(getTypeIcon(item.type))+" "+item.type));

if(item.tags.length){
  const tg=h("div",{class:"flex flex-wrap gap-0.5 mt-1.5"});
  item.tags.slice(0,2).forEach(t=>tg.appendChild(h("span",{style:{fontSize:"11.5px",padding:"2px 6px",background:c.bg,color:c.text,borderRadius:"2px",fontWeight:500}},"#"+t)));
  if(item.tags.length>2)tg.appendChild(h("span",{class:"font-mono",style:{fontSize:"10.5px",color:"var(--mute)",alignSelf:"center"}},`+${item.tags.length-2}`));
  b.appendChild(tg);
}
if(item.location)b.appendChild(h("div",{class:"font-mono mt-1",style:{fontSize:"11px",color:"var(--ink-3)"}},"📍 "+item.location));

card.appendChild(b);

/* ============== H: MobileNet-based image similarity ============== */
/* Loads TF.js + MobileNet on demand, computes 1280-d embeddings, compares via cosine. */

let __tfModel=null;
let __tfLoadingPromise=null;

function __loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector(`script[data-h-src="${src}"]`)){resolve();return}
    const s=document.createElement("script");
    s.src=src;
    s.dataset.hSrc=src;
    s.onload=()=>resolve();
    s.onerror=()=>reject(new Error("Failed to load "+src));
    document.head.appendChild(s);
  });
}

async function loadMobileNetModel(onPhase){
  if(__tfModel)return __tfModel;
  if(__tfLoadingPromise)return __tfLoadingPromise;
  __tfLoadingPromise=(async()=>{
    try{
      if(!window.tf){
        onPhase&&onPhase("下載 TensorFlow.js (~2 MB)...");
        console.log("[MobileNet] Loading TF.js...");
        await __loadScript("https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.22.0/dist/tf.min.js");
      }
      if(!window.mobilenet){
        onPhase&&onPhase("下載 MobileNet 模組...");
        console.log("[MobileNet] Loading mobilenet library...");
        await __loadScript("https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet@2.1.1/dist/mobilenet.min.js");
      }
      onPhase&&onPhase("初始化模型 (~14 MB，首次)...");
      console.log("[MobileNet] Initializing model (v2 alpha 1.0)...");
      const t0=performance.now();
      __tfModel=await window.mobilenet.load({version:2,alpha:1.0});
      const elapsed=(performance.now()-t0).toFixed(0);
      console.log(`[MobileNet] Model ready (${elapsed}ms)`);
      onPhase&&onPhase("完成");
      return __tfModel;
    }catch(e){
      __tfLoadingPromise=null;  /* allow retry on next call */
      throw e;
    }
  })();
  return __tfLoadingPromise;
}

/* Show a full-screen overlay while loading the model (only fires first time) */
async function ensureModelLoadedWithUI(){
  if(__tfModel)return __tfModel;
  const overlay=document.createElement("div");
  overlay.style.cssText="position:fixed;inset:0;background:rgba(40,32,28,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;color:#F0E6D2;padding:24px;text-align:center";

    <div style="font-size:52px;margin-bottom:14px">🧠</div>

    <div style="font-family:'JetBrains Mono',monospace;font-size:10.5px;letter-spacing:0.18em;color:#C4B591;margin-bottom:20px">MOBILENET v2 · ALPHA 1.0</div>
    <div style="font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.04em;font-weight:700" id="ml-status">準備中...</div>
    <div style="font-size:11px;color:#C4B591;margin-top:22px;max-width:300px;line-height:1.65">只需下載一次，之後瀏覽器會自動 cache。第一次需要約 10~30 秒（取決於網路）。</div>
  `;
  document.body.appendChild(overlay);
  try{
    return await loadMobileNetModel(msg=>{
      const s=overlay.querySelector("#ml-status");
      if(s)s.textContent=msg;
    });
  }catch(e){
    alert("AI 模型載入失敗：\n"+(e.message||e)+"\n\n照片仍可儲存，但這次不會檢查重複。");
    throw e;
  }finally{
    overlay.remove();
  }
}

/* Encode/decode Float32Array via base64 (compact ~5KB per 1280-d vector) */
function __float32ToBase64(arr){
  const u8=new Uint8Array(arr.buffer);
  let bin="";
  const chunk=8192;
  for(let i=0;i<u8.length;i+=chunk){
    bin+=String.fromCharCode.apply(null,u8.subarray(i,Math.min(i+chunk,u8.length)));
  }
  return btoa(bin);
}
function __base64ToFloat32(b64){
  try{
    const bin=atob(b64);
    const u8=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
    return new Float32Array(u8.buffer);
  }catch(e){return null}
}

/* Compute MobileNet embedding from a data URL or remote URL.
   Returns base64-encoded normalized Float32Array of length 1280, or null on failure. */
async function computeImageEmbedding(src){
  try{
    const model=await loadMobileNetModel();
    const img=await new Promise((resolve,reject)=>{
      const i=new Image();
      if(src&&!src.startsWith("data:"))i.crossOrigin="anonymous";
      i.onload=()=>resolve(i);
      i.onerror=()=>reject(new Error("image load failed"));
      i.src=src;
    });
    /* model.infer(img, true) returns embedding tensor of shape [1, 1280] */
    const embTensor=model.infer(img,true);
    const arr=await embTensor.data();
    embTensor.dispose();
    /* Normalize to unit length so cosine similarity = dot product */
    let sumSq=0;
    for(let i=0;i<arr.length;i++)sumSq+=arr[i]*arr[i];
    const norm=Math.sqrt(sumSq)||1;
    const out=new Float32Array(arr.length);
    for(let i=0;i<arr.length;i++)out[i]=arr[i]/norm;
    return __float32ToBase64(out);
  }catch(e){
    console.warn("[Embed] failed:",e.message);
    return null;
  }
}

/* Cosine similarity for two unit-normalized Float32Arrays = dot product */
function cosineSimilarity(a,b){
  if(!a||!b||a.length!==b.length)return 0;
  let dot=0;
  for(let i=0;i<a.length;i++)dot+=a[i]*b[i];
  return dot;
}

/* Find items similar to a given embedding (excluding self by id).
   Threshold is cosine similarity floor (0..1). Default 0.85. */
function findSimilarItems(emb,excludeId,threshold=0.85){
  if(!emb)return [];
  const targetVec=typeof emb==="string"?__base64ToFloat32(emb):emb;
  if(!targetVec)return [];
  return state.items
    .filter(it=>it.photoEmb&&it.id!==excludeId)
    .map(it=>{
      const v=__base64ToFloat32(it.photoEmb);
      return v?{item:it,sim:cosineSimilarity(targetVec,v)}:null;
    })
    .filter(x=>x&&x.sim>=threshold)
    .sort((a,b)=>b.sim-a.sim);
}

/* Scan whole library for similar pairs. Returns sorted list of {a, b, sim}. */
function scanAllDuplicates(threshold=0.85){
  const items=state.items.filter(it=>it.photoEmb);
  /* Decode all vectors once */
  const decoded=items.map(it=>{
    const v=__base64ToFloat32(it.photoEmb);
    return v?{item:it,vec:v}:null;
  }).filter(x=>x);
  const pairs=[];
  for(let i=0;i<decoded.length;i++){
    for(let j=i+1;j<decoded.length;j++){
      const sim=cosineSimilarity(decoded[i].vec,decoded[j].vec);
      if(sim>=threshold)pairs.push({a:decoded[i].item,b:decoded[j].item,sim});
    }
  }
  pairs.sort((x,y)=>y.sim-x.sim);
  return pairs;
}

/* Migration: compute embeddings for items missing one. progress(processed, total, currentItem) */
let migrationCancelled=false;
async function runEmbeddingMigration(progress){
  migrationCancelled=false;
  /* Make sure model is loaded BEFORE starting per-item work */
  await loadMobileNetModel();
  const todo=state.items.filter(it=>it.photo&&!it.photoEmb);
  let processed=0,failed=0;
  for(const item of todo){
    if(migrationCancelled)break;
    progress&&progress(processed,todo.length,item);
    const emb=await computeImageEmbedding(item.photo);
    if(emb){
      item.photoEmb=emb;
      try{await dbPut("items",item);processed++}
      catch(e){failed++;console.warn("[Migrate]",e)}
    }else{failed++}
    /* Yield to browser between items */
    await new Promise(r=>setTimeout(r,0));
  }
  return {processed,failed,total:todo.length,cancelled:migrationCancelled};
}

/* ============== Helper: sort by addedAt with id fallback ============== */
function sortByOrder(arr){
  const dir=state.sortOrder==="oldest"?1:-1;
  return arr.slice().sort((a,b)=>{
    const ta=a.addedAt,tb=b.addedAt;
    /* Both have addedAt → compare ISO strings (lexicographic == chronological) */
    if(ta&&tb){if(ta===tb)return 0;return (ta<tb?-1:1)*dir}
    /* Neither has addedAt → fallback to id for stable ordering */
    if(!ta&&!tb){const sa=String(a.id||""),sb=String(b.id||"");if(sa===sb)return 0;return (sa<sb?-1:1)*dir}
    /* Only one has addedAt: items without are treated as "older" (created before this feature) */
    return ta?-dir:dir;
  });
}
async function toggleSortOrder(){
  state.sortOrder=state.sortOrder==="newest"?"oldest":"newest";
  try{await dbSetSetting("sortOrder",state.sortOrder)}catch(e){console.warn("[Sort]",e)}
  render();
}

/* ============== Helper: filtered list (used by swipe nav) (E) ============== */
function getFilteredItemsForCurrentContext(){
  const isAll=state.ftype==="全部";
  const filtered=state.items.filter(i=>{
    const a=isAll||i.type===state.ftype;
    const b=matchesQuery(i,state.q);
    const c=state.filters.length===0||state.filters.every(x=>i.tags.includes(x));
    return a&&b&&c;
  });
  return sortByOrder(filtered);
}

/* ============== Photo zoom fullscreen overlay (F) ============== */
function openPhotoZoom(item){
  if(!item.photo)return;
  const existing=document.querySelector(".photo-zoom-overlay");
  if(existing)existing.remove();
  const overlay=document.createElement("div");
  overlay.className="photo-zoom-overlay";
  const img=document.createElement("img");
  img.className="photo-zoom-img";
  img.src=item.photo;
  img.draggable=false;
  overlay.appendChild(img);
  const closeBtn=document.createElement("button");
  closeBtn.className="photo-zoom-close";
  closeBtn.textContent="×";
  closeBtn.onclick=cleanup;
  overlay.appendChild(closeBtn);
  const hint=document.createElement("div");
  hint.className="photo-zoom-hint";
  hint.innerHTML="雙指縮放 · 雙擊放大 · 點空白關閉";
  overlay.appendChild(hint);

  /* Custom pinch-zoom (since viewport disables native) */
  let scale=1,tx=0,ty=0;
  let startDist=null,startScale=1;
  let panStartX=0,panStartY=0,isPanning=false;
  let lastTapTime=0;
  function apply(animate){
    img.style.transition=animate?"transform .22s ease":"none";
    img.style.transform=`translate(${tx}px,${ty}px) scale(${scale})`;
  }
  function reset(animate){scale=1;tx=0;ty=0;apply(animate)}

  img.addEventListener("touchstart",e=>{
    if(e.touches.length===2){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      startDist=Math.hypot(dx,dy);
      startScale=scale;
      isPanning=false;
    }else if(e.touches.length===1){
      panStartX=e.touches[0].clientX-tx;
      panStartY=e.touches[0].clientY-ty;
      isPanning=true;
    }
  },{passive:true});

  img.addEventListener("touchmove",e=>{
    e.preventDefault();
    if(e.touches.length===2&&startDist){
      const dx=e.touches[0].clientX-e.touches[1].clientX;
      const dy=e.touches[0].clientY-e.touches[1].clientY;
      const dist=Math.hypot(dx,dy);
      scale=Math.max(1,Math.min(5,startScale*dist/startDist));
      apply(false);
    }else if(e.touches.length===1&&isPanning&&scale>1){
      tx=e.touches[0].clientX-panStartX;
      ty=e.touches[0].clientY-panStartY;
      apply(false);
    }
  },{passive:false});

  img.addEventListener("touchend",e=>{
    if(e.touches.length<2)startDist=null;
    if(e.touches.length===0){
      isPanning=false;
      /* Double-tap detection */
      const now=Date.now();
      if(now-lastTapTime<300){
        if(scale>1.05){reset(true)}
        else{scale=2.2;tx=0;ty=0;apply(true)}
        lastTapTime=0;
      }else{
        lastTapTime=now;
        if(scale<=1.001)reset(true);
      }
    }
  });

  /* Click on dark background closes */
  overlay.addEventListener("click",e=>{if(e.target===overlay)cleanup()});

  function cleanup(){
    overlay.remove();
    state.zoomItem=null;
  }
  /* ESC key closes */
  function onKey(e){if(e.key==="Escape")cleanup()}
  document.addEventListener("keydown",onKey,{once:true});

  document.body.appendChild(overlay);
  state.zoomItem=item;
}

/* ============== Detail swipe nav handler (E) ============== */
function attachSwipeNav(el,currentItem){
  const list=getFilteredItemsForCurrentContext();
  const idx=list.findIndex(x=>x.id===currentItem.id);
  if(idx<0||list.length<2)return;

  let startX=0,startY=0,startT=0,active=false;
  const leftHint=el.querySelector(".swipe-hint.left");
  const rightHint=el.querySelector(".swipe-hint.right");

  el.addEventListener("touchstart",e=>{
    if(e.touches.length!==1)return;
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    startT=Date.now();
    active=true;
  },{passive:true});

  el.addEventListener("touchmove",e=>{
    if(!active||e.touches.length!==1)return;
    const dx=e.touches[0].clientX-startX;
    const dy=e.touches[0].clientY-startY;
    /* Only show hints once gesture is clearly horizontal */
    if(Math.abs(dx)>30&&Math.abs(dx)>Math.abs(dy)*1.4){
      if(dx<0&&idx<list.length-1)leftHint?.classList.add("active");
      if(dx>0&&idx>0)rightHint?.classList.add("active");
    }else{
      leftHint?.classList.remove("active");
      rightHint?.classList.remove("active");
    }
  },{passive:true});

  el.addEventListener("touchend",e=>{
    if(!active)return;
    active=false;
    leftHint?.classList.remove("active");
    rightHint?.classList.remove("active");
    const endX=e.changedTouches[0].clientX;
    const endY=e.changedTouches[0].clientY;
    const dx=endX-startX;
    const dy=endY-startY;
    const dt=Date.now()-startT;
    /* Need: horizontal-dominant, > 70px, < 600ms */
    if(Math.abs(dx)<70||Math.abs(dx)<Math.abs(dy)*1.4||dt>600)return;
    if(dx<0&&idx<list.length-1){
      setS({selected:list[idx+1]});
    }else if(dx>0&&idx>0){
      setS({selected:list[idx-1]});
    }
  });
}

function tog(t){state.filters=state.filters.includes(t)?state.filters.filter(x=>x!==t):[...state.filters,t];render()}
async function addT(t){if(!t||!t.trim())return;const trimmed=t.trim();if(state.form.tags.includes(trimmed)){state.tagIn="";render();return}state.form.tags.push(trimmed);state.tagIn="";if(!getTagGroup(trimmed)){showNewTagModal(trimmed)}else{render()}}

/* save() now triggers FILE animation and waits for it before navigating */
let isSaving=false;
async function save(btn,mode="done"){
  if(isSaving)return;
  isSaving=true;
  if(btn){btn.disabled=true;btn.dataset.origText=btn.textContent;btn.textContent="儲存中..."}
  try{
    const i={...state.form,tags:[...state.form.tags]};
    const isEdit=!!i.id;
    if(isEdit){
      await dbPut("items",i);
      state.items=state.items.map(x=>x.id===i.id?i:x);
    }else{
      delete i.id;
      i.addedAt=new Date().toISOString();
      const id=await dbAdd("items",i);
      i.id=id;
      state.items.push(i);
    }
    if(btn){btn.textContent=btn.dataset.origText||"FILE";btn.disabled=false}
    const duration=triggerSaveAnimation(btn,i);
    setTimeout(()=>{
      isSaving=false;
      if(isEdit){
        state.lastEditedId=i.id;
        state.form=emptyForm();
        setS({view:"gallery",ftype:i.type});
      }else if(mode==="next"){
        /* Continue mode: clear photo but keep sticky fields */
        const newForm={
          ...emptyForm(),
          type:i.type,
          brand:i.brand,
          tags:[...i.tags],
          location:i.location,
          purchaseDate:i.purchaseDate,
          quantity:i.quantity,
          currency:i.currency,
          store:i.store,
          tripId:i.tripId
        };
        /* Auto-pull next photo from batch queue */
        if(state.photoQueue&&state.photoQueue.length){
          const next=state.photoQueue.shift();
          newForm.photo=next.photo;
          newForm.photoRatio=next.photoRatio;
          newForm.photoEmb=next.photoEmb;
        }
        state.form=newForm;
        setS({view:"add",form:state.form});
      }else{
        state.form=emptyForm();
        setS({view:"shelf"});
      }
    },duration);
  }catch(err){
    console.error("[Save]",err);
    isSaving=false;
    if(btn){btn.textContent=btn.dataset.origText||"FILE";btn.disabled=false}
    alert("儲存失敗：\n"+(err.message||err.code||err));
  }
}

async function clearAllData(){
  if(!currentUser){alert("請先登入");return}
  if(!confirm("⚠ 確定要清空雲端所有資料嗎？\n\n這會刪除：\n• 所有品項（含照片）\n• 所有主題\n• 自訂類型與設定\n\n無法復原！")){return}
  if(!confirm("最後確認：真的要清空雲端資料？")){return}
  try{
    /* Delete all items (including photos in Storage) */
    const itemsSnap=await fb.getDocs(fb.collection(fb.db,...userPath("items")));
    for(const d of itemsSnap.docs){
      try{
        const photoRef=fb.storageRef(fb.storage,`users/${currentUser.uid}/photos/${d.id}.jpg`);
        await fb.deleteObject(photoRef);
      }catch(err){if(err.code!=="storage/object-not-found")console.warn("[DelPhoto]",err)}
      await fb.deleteDoc(d.ref);
    }
    /* Delete trips */
    const tripsSnap=await fb.getDocs(fb.collection(fb.db,...userPath("trips")));
    for(const d of tripsSnap.docs)await fb.deleteDoc(d.ref);
    /* Delete settings */
    const settingsSnap=await fb.getDocs(fb.collection(fb.db,...userPath("settings")));
    for(const d of settingsSnap.docs)await fb.deleteDoc(d.ref);
    
    state.items=[];state.trips=[];state.customTypes=[];
    state.tagGroups=JSON.parse(JSON.stringify(DEFAULT_TAG_GROUPS));
    state.rates={JPY:0.21,USD:31,TWD:1};
    state.budgets={monthly:null,yearly:null,currency:"TWD"};
    state.animationStyle="both";
    alert("✓ 清空完成");
    setS({view:"shelf"});
  }catch(err){alert("清空失敗："+err.message)}
}

async function importData(e,mode="merge"){
  if(!currentUser){alert("請先登入");return}
  const f=e.target.files[0];if(!f)return;
  const text=await f.text();
  let data;
  try{data=JSON.parse(text)}catch(err){alert("檔案不是有效的 JSON");return}
  if(!data.items){alert("檔案格式不正確");return}
  const label=mode==="replace"?"取代":"合併";
  const note=mode==="replace"?"⚠ 會先清空雲端資料、用備份完整覆蓋":"會加入現有資料、編號可能跳號";
  if(!confirm(`【${label}】匯入 ${data.items.length} 個品項\n\n${note}\n\n繼續？`))return;
  try{
    if(mode==="replace"){
      /* Clear cloud first */
      const itemsSnap=await fb.getDocs(fb.collection(fb.db,...userPath("items")));
      for(const d of itemsSnap.docs){
        try{
          const photoRef=fb.storageRef(fb.storage,`users/${currentUser.uid}/photos/${d.id}.jpg`);
          await fb.deleteObject(photoRef);
        }catch(err){}
        await fb.deleteDoc(d.ref);
      }
      const tripsSnap=await fb.getDocs(fb.collection(fb.db,...userPath("trips")));
      for(const d of tripsSnap.docs)await fb.deleteDoc(d.ref);
      state.items=[];state.trips=[];state.customTypes=[];
    }
    /* Import items */
    for(const i of data.items){
      const ni={...i};
      /* Preserve archiveNum (from old export, this may be the IndexedDB id) */
      if(!ni.archiveNum&&typeof i.id==="number")ni.archiveNum=i.id;
      delete ni.id;
      const id=await dbAdd("items",ni);
      state.items.push({...ni,id});
    }
    if(data.trips)for(const t of data.trips){
      const nt={...t};delete nt.id;
      const id=await dbAdd("trips",nt);
      state.trips.push({...nt,id});
    }
    if(data.customTypes){state.customTypes=data.customTypes;await dbSetSetting("customTypes",state.customTypes)}
    if(data.tagGroups){state.tagGroups=data.tagGroups;await saveTagGroups()}
    if(data.rates){state.rates=data.rates;await dbSetSetting("rates",state.rates)}
    if(data.budgets){state.budgets=data.budgets;await dbSetSetting("budgets",state.budgets)}
    if(data.animationStyle){state.animationStyle=data.animationStyle;await dbSetSetting("animationStyle",state.animationStyle)}
    alert(`✓ 匯入成功\n${data.items.length} 個品項已${label==="取代"?"還原":"加入"}`);
    render();
  }catch(err){alert("匯入失敗："+err.message)}
}

/* ============== INIT ============== */
/* ============== INIT (Firebase auth flow) ============== */
async function loadUserData(){
  state.items=await dbAll("items");
  state.trips=await dbAll("trips");
  state.customTypes=(await dbGetSetting("customTypes"))||[];
  /* Migrate legacy customTypes (strings) to new object format with code+color */
  let migrated=false;
  const usedColors=COLOR_PALETTE.map(c=>c.key);
  state.customTypes=state.customTypes.map((t,idx)=>{
    if(typeof t==="string"){
      migrated=true;
      const autoCode=t.replace(/[^a-zA-Z0-9]/g,'').toUpperCase().slice(0,4)||`CT${idx+1}`;
      const autoColor=usedColors[idx%usedColors.length];
      return {name:t,code:autoCode,color:autoColor};
    }
    return t;
  });
  if(migrated)await dbSetSetting("customTypes",state.customTypes);
  state.tagGroups=(await dbGetSetting("tagGroups"))||JSON.parse(JSON.stringify(DEFAULT_TAG_GROUPS));
  /* Migration: ensure Michelle's favorite tags exist in their groups */
  let tagsChanged=false;
  for(const[gid,favTags] of Object.entries(MICHELLE_FAVORITES)){
    const g=state.tagGroups.find(x=>x.id===gid);
    if(!g)continue;
    for(const t of favTags){
      if(!g.tags.includes(t)){g.tags.push(t);tagsChanged=true}
    }
  }
  if(tagsChanged)await saveTagGroups();
  /* Migration: trip group "旅行/🛫" → "主題/🎡" (theme rename) */
  const tripG=state.tagGroups.find(g=>g.id==="trip");
  if(tripG&&(tripG.name==="旅行"||tripG.icon==="🛫")){
    tripG.name="主題";tripG.icon="🎡";
    await saveTagGroups();
  }
  /* Migration: existing trips need archiveNum (if missing) */
  let tripsNeedNum=state.trips.filter(t=>!t.archiveNum);
  if(tripsNeedNum.length){
    /* Sort by addedAt or fall back to id */
    tripsNeedNum.sort((a,b)=>(a.addedAt||a.id||"").localeCompare(b.addedAt||b.id||""));
    let n=state.trips.reduce((m,x)=>Math.max(m,x.archiveNum||0),0);
    for(const t of tripsNeedNum){
      n++;t.archiveNum=n;
      try{await dbPut("trips",t)}catch(err){console.warn("[ThemeMigrate]",err)}
    }
  }
  state.rates=(await dbGetSetting("rates"))||{JPY:0.21,USD:31,TWD:1};
  state.budgets=(await dbGetSetting("budgets"))||{monthly:null,yearly:null,currency:"TWD"};
  state.animationStyle=(await dbGetSetting("animationStyle"))||"both";
  state.sortOrder=(await dbGetSetting("sortOrder"))||"newest";
}

async function migrateFromLegacyIndexedDB(){
  /* Check if legacy IndexedDB has data, offer to migrate */
  let oldDb;
  try{
    oldDb=await new Promise((res,rej)=>{
      const req=indexedDB.open(DB_NAME);
      req.onsuccess=()=>res(req.result);
      req.onerror=()=>rej(req.error);
      req.onblocked=()=>rej(new Error("blocked"));
    });
  }catch(err){return false}
  if(!oldDb||!oldDb.objectStoreNames.contains("items")){oldDb&&oldDb.close();return false}
  
  const oldItems=await new Promise(r=>{
    const tx=oldDb.transaction("items","readonly");
    tx.objectStore("items").getAll().onsuccess=e=>r(e.target.result);
  });
  if(!oldItems||!oldItems.length){oldDb.close();return false}
  
  /* Check if already migrated */
  const migrated=await dbGetSetting("legacyMigrated");
  if(migrated){oldDb.close();return false}
  
  if(!confirm(`偵測到本機有 ${oldItems.length} 筆舊資料（IndexedDB）\n\n要上傳到雲端嗎？\n\n• 確定 = 上傳並設為已遷移\n• 取消 = 跳過（之後仍可手動匯入）`)){
    await dbSetSetting("legacyMigrated",true);
    oldDb.close();return false;
  }
  
  /* Migrate each item: keep old id as archiveNum */
  const oldTrips=oldDb.objectStoreNames.contains("trips")?await new Promise(r=>{
    const tx=oldDb.transaction("trips","readonly");
    tx.objectStore("trips").getAll().onsuccess=e=>r(e.target.result);
  }):[];
  
  let success=0;
  for(const oldItem of oldItems){
    try{
      const newItem={...oldItem,archiveNum:oldItem.id};
      delete newItem.id;
      await dbAdd("items",newItem);
      success++;
    }catch(err){console.error("Migration item failed:",oldItem,err)}
  }
  for(const oldTrip of oldTrips){
    try{
      const newTrip={...oldTrip};delete newTrip.id;
      await dbAdd("trips",newTrip);
    }catch(err){console.error("Migration trip failed:",err)}
  }
  
  /* Migrate settings */
  if(oldDb.objectStoreNames.contains("settings")){
    const oldSettings=await new Promise(r=>{
      const tx=oldDb.transaction("settings","readonly");
      tx.objectStore("settings").getAll().onsuccess=e=>r(e.target.result);
    });
    for(const s of oldSettings||[]){
      try{await dbSetSetting(s.key,s.value)}catch(err){}
    }
  }
  
  await dbSetSetting("legacyMigrated",true);
  oldDb.close();
  alert(`✓ 遷移完成\n\n已上傳 ${success}/${oldItems.length} 筆品項到雲端\n\n編號保持一致（archiveNum = 原 id）`);
  return true;
}

/* Wait for Firebase to be ready */
function whenFirebaseReady(){
  return new Promise(r=>{
    if(window.firebaseReady)r();
    else window.addEventListener("firebaseready",r,{once:true});
  });
}

(async()=>{
  /* Render loading view immediately so user sees something */
  state.view="loading";
  render();
  
  /* Add timeout warning if Firebase fails to load */
  const timeoutId=setTimeout(()=>{
    if(!window.firebaseReady){
      const root=document.getElementById('app');
      if(root){
        root.innerHTML='';
        const div=document.createElement('div');
        div.style.cssText='padding:32px;text-align:center;font-family:sans-serif';
        div.innerHTML='<h2 style="font-weight:800;margin-bottom:12px">無法連線</h2><p style="color:#666;font-size:13px;line-height:1.6">Firebase 載入失敗。可能原因：<br>• 沒有網路連線<br>• 防火牆阻擋<br>• Firebase 服務暫時故障<br><br>請檢查網路後<b>重新整理頁面</b>。</p>';
        root.appendChild(div);
      }
    }
  },30000);
  
  await whenFirebaseReady();
  clearTimeout(timeoutId);
  
  /* Handle redirect result (in case popup was blocked) */
  try{await fb.getRedirectResult(fb.auth)}catch(err){console.warn("[Redirect]",err)}
  
  /* Listen for auth state changes */
  fb.onAuthStateChanged(fb.auth,async(user)=>{
    if(user){
      currentUser=user;
      console.log("[Auth] Signed in as",user.email);
      try{
        /* Migrate first (must happen before loadUserData reads from cloud) */
        await migrateFromLegacyIndexedDB();
        await loadUserData();
        /* Hide login if shown */
        if(state.view==="login"||state.view==="loading"){
          state.view="shelf";
        }
        render();
      }catch(err){
        console.error("[LoadData]",err);
        alert("載入資料失敗：\n"+err.message+"\n\n請重新整理試試");
      }
    }else{
      currentUser=null;
      state.items=[];state.trips=[];state.customTypes=[];
      state.tagGroups=JSON.parse(JSON.stringify(DEFAULT_TAG_GROUPS));
      state.view="login";
      render();
    }
  });
})();
